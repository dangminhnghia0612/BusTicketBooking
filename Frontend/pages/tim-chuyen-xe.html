<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kết quả tìm kiếm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../styles/components/tim-chuyen-xe.css" />
    <script type="module" src="../scripts/modules/chuyenxe.js"></script>
  </head>
  <body>
    <div class="container mt-4">
      <h3 class="text-danger" id="search-header">Kết quả tìm kiếm</h3>
      <div id="search-results" class="mt-3">
        <!-- Danh sách chuyến xe sẽ được hiển thị ở đây -->
      </div>
    </div>
    <!-- Template HTML cho mỗi chuyến xe -->
    <template id="chuyen-xe-template">
      <div class="container py-4">
        <div class="card">
          <!-- Card Header -->
          <div class="card-header">
            <div class="row align-items-center">
              <!-- Departure Time and Location -->
              <div class="col-3 text-center">
                <div class="time-badge giodi"></div>
                <div>
                  <i
                    class="fas fa-circle text-success"
                    style="font-size: 10px"
                  ></i>
                </div>
                <div class="location diemdi"></div>
              </div>

              <!-- Duration -->
              <div class="col-6 text-center">
                <div class="duration-badge khoangthoigian"></div>
                <div
                  class="dotted-line"
                  style="border-top: 1px dotted #ccc; margin: 5px 0"
                ></div>
              </div>

              <!-- Arrival Time and Location -->
              <div class="col-3 text-center">
                <div class="time-badge gioden"></div>
                <div><i class="fas fa-map-marker-alt text-danger"></i></div>
                <div class="location diemden"></div>
              </div>
            </div>

            <!-- Amenities and Price -->
            <div class="row mt-3 align-items-center">
              <div class="col-8">
                <span class="amenity-badge tenloai"></span>
                <span class="seats-available soGheConTrong"></span>
              </div>
              <div class="col-4 text-end">
                <div class="price giave"></div>
              </div>
            </div>
          </div>

          <!-- Card Footer -->
          <div class="card-footer">
            <div class="row align-items-center">
              <div class="col-8 col-md-9">
                <ul class="nav">
                  <li class="nav-item">
                    <a class="nav-link active" href="#">Chọn ghế</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Lịch trình</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Trung chuyển</a>
                  </li>
                  <li class="nav-item d-none d-md-block">
                    <a class="nav-link" href="#">Chính sách</a>
                  </li>
                </ul>
              </div>
              <div class="col-4 col-md-3 text-end">
                <button class="btn btn-book">Chọn chuyến</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </body>
</html>
