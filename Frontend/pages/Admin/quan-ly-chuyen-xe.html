        <!-- Modal Thêm chuyến xe -->
        <div
          class="modal fade"
          id="modalChuyenXe"
          tabindex="-1"
          aria-labelledby="tieudeModalChuyenXe"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="tieudeModalChuyenXe">
                  Thêm chuyến xe mới
                </h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <form id="formChuyenXe">
                  <!-- Chọn Tỉnh đi -->
                  <div class="row">
                    <!-- Chọn Tỉnh đi -->
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="tinhBendi" class="form-label"
                          >Tỉnh đi</label
                        >
                        <select
                          class="form-select"
                          id="tinhdi"
                          required
                        ></select>
                      </div>
                    </div>

                    <!-- Chọn Tỉnh đến -->
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="tinhBenden" class="form-label"
                          >Tỉnh đến</label
                        >
                        <select
                          class="form-select"
                          id="tinhden"
                          required
                        ></select>
                      </div>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="tuyenxe" class="form-label">Tuyến xe</label>
                    <select class="form-select" id="tuyenxe" required></select>
                  </div>
                  <div class="mb-3">
                    <label for="xe" class="form-label">Xe</label>
                    <select class="form-select" id="xe" required></select>
                  </div>
                  <div class="mb-3">
                    <label for="giodi" class="form-label"
                      >Thời gian khởi hành</label
                    >
                    <input
                      type="datetime-local"
                      class="form-control"
                      id="giodi"
                      required
                    />
                  </div>
                </form>
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Hủy
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="btnLuuChuyenXe"
                >
                  Lưu
                </button>
              </div>
            </div>
          </div>
