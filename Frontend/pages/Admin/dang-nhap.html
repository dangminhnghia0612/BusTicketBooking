<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Trị Hệ Thống Bán Vé Xe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles/pages/Admin/dang-nhap.css" />
  </head>
  <body>
    <div class="login-card">
      <h4 class="login-title">Admin Login</h4>

      <div class="avatar-container">
        <div class="avatar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
        </div>
        <div class="shape circle-blue"></div>
        <div class="shape triangle-green"></div>
        <div class="shape circle-orange"></div>
        <div class="shape triangle-light-green"></div>
      </div>
      <form id="login-form" enctype="multipart/form-data">
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
          <input
            type="text"
            id="tendangnhap"
            class="form-control"
            placeholder="Tên đăng nhập"
            required
          />
        </div>

        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
            />
          </svg>
          <input
            type="password"
            id="matkhau"
            class="form-control"
            placeholder="Mật khẩu"
            required
          />
        </div>

        <button type="submit" id="submit-btn" class="btn btn-login btn-primary">
          Đăng nhập
        </button>
        <div class="text-center mt-3 d-flex justify-content-center">
          <div
            id="loading-spinner"
            class="spinner-border text-primary"
            role="status"
            style="display: none"
          >
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </form>
      <div
        id="message-box"
        class="text-center mt-3 text-danger"
        style="display: none"
      ></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      type="module"
      src="../../scripts/modules/Admin/dang-nhap.js"
    ></script>
  </body>
</html>
