        <div class="container-fluid pb-5">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>Quản lý xe và loại xe</h4>
            <!--2 Nút thêm -->
            <div>
              <button
                class="btn btn-outline-primary me-2"
                id="btnThemLoaiXe"

                <i class="bi bi-plus-lg me-1"></i> Thêm loại xe
              </button>
              <button class="btn btn-outline-primary me-2" id="btnThemXe">
                <i class="bi bi-plus-lg me-1"></i> Thêm xe
              </button>
            </div>
          </div>
          <!-- 2 thẻ link để chuyển tab -->
          <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
              <a
                id="link-xe"
                class="nav-link active"
                href="#vehicles-tab"
                data-bs-toggle="tab"
                >Danh sách xe</a
              >
            </li>
            <li class="nav-item">
              <a
                id="link-loaixe"
                class="nav-link"
                href="#vehicle-types-tab"
                data-bs-toggle="tab"
                >Loại xe</a
              >
            </li>
          </ul>

          <div class="tab-content">
            <div class="tab-pane fade show active" id="vehicles-tab">
              <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-12 col-md-5">
                      <div class="input-group">
                        <span class="input-group-text bg-light"
                          ><i class="bi bi-search"></i
                        ></span>
                        <input
                          type="text"
                          class="form-control"
                          placeholder="Tìm kiếm xe..."
                        />
                      </div>
                    </div>
                    <div class="col-12 col-md-5">
                      <select class="form-select">
                        <option selected>Loại xe</option>
                        <option>Giường nằm</option>
                        <option>Limousine</option>
                        <option>Ghế ngồi</option>
                      </select>
                    </div>

                        <option>Không hoạt động</option>
                      </select>
                    </div> -->
                    <div class="col-12 col-md-2">
                      <button class="btn btn-primary w-100">Lọc</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                  <div class="table-responsive">
                    <table class="table table-hover mb-0">
                      <thead class="table-light">
                        <tr>
                          <th>ID</th>
                          <th>Biển số xe</th>
                          <th>Loại xe</th>
                          <th>Tên xe</th>
                          <th>Số ghế</th>
                          <!-- <th>Trạng thái</th> -->
                          <th>Thao tác</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>

                    <p class="mb-0 text-muted">Hiển thị 1-4 của 20 xe</p>
                    <nav>
                      <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled">
                          <a class="page-link" href="#">Trước</a>
                        </li>
                        <li class="page-item active">

                        <li class="page-item">

                          <a class="page-link" href="#">Sau</a>
                        </li>
                      </ul>
                    </nav>
                  </div>
                </div> -->
              </div>
            </div>

            <div class="tab-pane fade" id="vehicle-types-tab">
              <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <div class="input-group">
                        <span class="input-group-text bg-light"
                          ><i class="bi bi-search"></i
                        ></span>
                        <input
                          type="text"
                          class="form-control"
                          placeholder="Tìm kiếm loại xe..."
                        />
                      </div>
                    </div>
                    <!-- <div class="col-12 col-md-4">
                      <select class="form-select">
                        <option selected>Trạng thái</option>
                        <option>Đang sử dụng</option>
                        <option>Không sử dụng</option>
                      </select>
                    </div> -->
                    <!-- <div class="col-12 col-md-2">
                      <button class="btn btn-primary w-100">Lọc</button>
                    </div> -->
                  </div>
                </div>
              </div>

              <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                  <div class="table-responsive">
                    <table class="table table-hover mb-0">
                      <thead class="table-light">
                        <tr>
                          <th>ID</th>
                          <th>Tên loại xe</th>
                          <th>Số lượng ghế</th>
                          <th>Nhà vệ sinh</th>
                          <!-- <th>Trạng thái</th> -->
                          <th>Thao tác</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>

                      <ul class="pagination pagination-sm mb-0">

        </div>
        <!-- Modal Thêm Xe -->
        <div
          class="modal fade"
          id="modalXe"
          tabindex="-1"
          aria-labelledby="addVehicleModalLabel"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="tieudeModalXe">Thêm xe mới</h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <form id="formXe">
                  <div class="mb-3">
                    <label for="bienso" class="form-label"
                      >Biển số xe (51A-11111)</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="bienso"
                      required
                    />
                  </div>
                  <div class="mb-3">
                    <label for="loaixe" class="form-label">Loại xe</label>
                    <select class="form-select" id="loaixe" required>
                      <option value="" disabled selected>Chọn loại xe</option>
                    </select>
                  </div>
                  <div class="mb-3">
                    <label for="tenxe" class="form-label"
                      >Tên xe (Tùy chọn)</label
                    >
                    <input type="text" class="form-control" id="tenxe" />
                  </div>
                </form>
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Hủy
                </button>
                <button type="submit" class="btn btn-primary" id="btnLuuXe">
                  Lưu
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- Footer Component -->
        <div id="footer-container"></div>
