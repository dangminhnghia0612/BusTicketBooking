<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhà xe Minh Nghĩa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/pages/dang-nhap.css" />
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow p-4" style="width: 100%; max-width: 400px">
        <h2 id="form-title" class="text-center mb-4">Đăng Nhập</h2>
        <form id="auth-form" enctype="multipart/form-data">
          <!-- Trường Họ tên (ẩn khi ở trạng thái Đăng nhập) -->
          <div class="mb-3" id="fullname-group" style="display: none">
            <label for="fullname" class="form-label">Họ tên</label>
            <input
              type="text"
              id="fullname"
              class="form-control"
              placeholder="Họ tên"
            />
          </div>
          <!-- Trường Email -->
          <div class="mb-3">
            <label for="email" id="lblEmail" class="form-label"
              >Email hoặc Số điện thoại</label
            >
            <input
              type="text"
              id="email"
              class="form-control"
              placeholder="Email hoặc Số điện thoại"
              required
            />
          </div>
          <!-- Trường Số điện thoại (ẩn khi ở trạng thái Đăng nhập) -->
          <div class="mb-3" id="phone-group" style="display: none">
            <label for="phone" class="form-label">Số điện thoại</label>
            <input
              type="text"
              id="phone"
              class="form-control"
              placeholder="Số điện thoại"
            />
          </div>
          <!-- Trường Mật khẩu -->
          <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Mật khẩu"
              required
            />
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary w-100">
            Đăng Nhập
          </button>
          <div class="text-center mt-3 d-flex justify-content-center">
            <div
              id="loading-spinner"
              class="spinner-border text-primary"
              role="status"
              style="display: none"
            >
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </form>
        <div
          id="message-box"
          class="text-center mt-3 text-danger"
          style="display: none"
        ></div>
        <div class="text-center mt-3">
          <span id="toggle-form" class="text-primary" style="cursor: pointer">
            Chưa có tài khoản? Đăng ký ngay
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../scripts/modules/auth.js"></script>
