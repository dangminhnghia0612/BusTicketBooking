<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhà xe Minh Nghĩa</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-top">
          <!-- <div class="language">
            <select name="" id="">
              <option value="">VIE</option>
              <option value="">ENG</option>
            </select>
          </div> -->
          <!-- <div class="app-download">
            <a href="#">Tải ứng dụng</a>
          </div> -->
          <div class="login-register">
            <div class="before-login">
              <i id="fa-user" class="fas fa-user"></i>
              <a href="./pages/dang-nhap.html" id="login-link">
                <strong>Đăng nhập/Đăng ký</strong>
              </a>
            </div>
            <div class="after-login" style="display: none">
              <button id="menu-toggle" class="menu-toggle">
                <img id="user-avatar" src="" alt="Avatar" />
                <span id="user-name"></span>
                <i id="fa-caret-down" class="fas fa-caret-down"></i>
              </button>
              <div id="user-menu" class="user-menu">
                <ul>
                  <li>
                    <a href="./pages/chinh-sua-thong-tin.html"
                      >Chỉnh sửa thông tin</a
                    >
                  </li>
                  <li>
                    <a href="./pages/lich-su-dat-ve.html">Lịch sử đặt vé</a>
                  </li>
                  <li><a href="#" id="logout">Đăng xuất</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
        <div class="header-main">
          <img
            src="assets/images/logo.png"
            alt="Logo nhà xe Minh Nghĩa"
            class="logo"
          />
          <!-- Menu -->
          <nav class="nav">
            <a href="#">Trang chủ</a>
            <a href="#">Lịch trình</a>
            <a href="#">Tra cứu vé</a>
            <a href="#">Tin tức</a>
            <a href="#">Hóa đơn</a>
            <a href="#">Liên hệ</a>
            <a href="#">Về chúng tôi</a>
          </nav>
        </div>
      </div>
    </header>

    <section class="banner">
      <div class="container">
        <div class="banner-content">
          <h1>Nhà xe Minh Nghĩa - Kính chào quý khách</h1>
          <img
            width="100%"
            src="assets/images/banner_Futa px.png"
            alt="Buses"
          />
        </div>
      </div>
    </section>

    <section class="search">
      <div class="container">
        <form class="search-form">
          <div class="form-group">
            <label>Điểm đi</label>
            <input
              type="text"
              id="departure-input"
              placeholder="Nhập điểm đi"
              value="TP HCM"
              autocomplete="off"
            />
            <select
              id="departure-suggestions"
              class="suggestions"
              size="5"
              style="display: none"
            ></select>
          </div>
          <div class="swap-button">
            <button type="button" id="swap-button" class="btn-swap">↔</button>
          </div>
          <div class="form-group">
            <label>Điểm đến</label>
            <input
              type="text"
              id="destination-input"
              placeholder="Nhập điểm đến"
              value="Khánh Hòa"
              autocomplete="off"
            />
            <select
              id="destination-suggestions"
              class="suggestions"
              size="5"
              style="display: none"
            ></select>
          </div>
          <div class="form-group">
            <label>Ngày đi</label>
            <input type="date" id="departure-date" />
          </div>
          <div class="form-group">
            <label>Số vé</label>
            <select id="ticket-count">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <button type="button" id="search-button" class="btn-search">
            Tìm chuyến xe
          </button>
        </form>
      </div>
    </section>
    <section
      id="iframe-container"
      class="container"
      style="display: none; margin-top: 20px"
    >
      <iframe
        id="result-iframe"
        src=""
        style="width: 100%; height: 600px; border: none"
      ></iframe>
    </section>

    <footer class="footer">
      <div class="container">
        <p>© 2025 Nhà xe MINH NGHĨA - Chất lượng là danh dự.</p>
      </div>
    </footer>
  </body>
</html>
<script type="module" src="./scripts/main.js"></script>
