<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhà xe Minh Nghĩa</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/components/header.css" />
    <link rel="stylesheet" href="./styles/components/footer.css" />
    <link rel="stylesheet" href="./styles/pages/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <header></header>
    <!-- Header sẽ được tải từ header.html -->
    <section class="banner">
      <div class="container">
        <div class="banner-content">
          <h1>Nhà xe Minh Nghĩa - Kính chào quý khách</h1>
          <img
            width="100%"
            src="./assets/images/banner_Futa px.png"
            alt="Buses"
          />
        </div>
      </div>
    </section>
    <section class="search">
      <div class="container">
        <form class="search-form">
          <div class="form-group">
            <label>Điểm đi</label>
            <input
              type="text"
              id="departure-input"
              placeholder="Nhập điểm đi"
              value="TP. Hồ Chí Minh"
              autocomplete="off"
            />
            <select
              id="departure-suggestions"
              class="suggestions"
              size="5"
              style="display: none"
            ></select>
          </div>
          <div class="swap-button">
            <button type="button" id="swap-button" class="btn-swap">↔</button>
          </div>
          <div class="form-group">
            <label>Điểm đến</label>
            <input
              type="text"
              id="destination-input"
              placeholder="Nhập điểm đến"
              value="Khánh Hòa"
              autocomplete="off"
            />
            <select
              id="destination-suggestions"
              class="suggestions"
              size="5"
              style="display: none"
            ></select>
          </div>
          <div class="form-group">
            <label>Ngày đi</label>
            <input type="date" id="departure-date" />
          </div>
          <div class="form-group">
            <label>Số vé</label>
            <select id="ticket-count">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <button type="button" id="search-button" class="btn-search">
            Tìm chuyến xe
          </button>
        </form>
      </div>
    </section>
    <section
      id="iframe-container"
      class="container"
      style="display: none; margin-top: 20px"
    >
      <iframe
        id="result-iframe"
        src=""
        style="width: 100%; height: 600px; border: none"
      ></iframe>
    </section>
    <footer></footer>
  </body>
  <script type="module" src="./scripts/main.js"></script>
</html>
